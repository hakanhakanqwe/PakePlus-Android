<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turk IPTV Player</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 350px;
            background: #1a1a1a;
            border-right: 1px solid #333;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .sidebar-header {
            padding: 20px;
            background: #222;
            border-bottom: 1px solid #333;
        }

        .sidebar-header h1 {
            font-size: 1.5rem;
            color: #e50914;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-box {
            margin-top: 15px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px 10px 40px;
            background: #333;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .search-box input:focus {
            border-color: #e50914;
            background: #2a2a2a;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .category-filter {
            display: flex;
            gap: 8px;
            padding: 15px 20px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .category-filter::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            padding: 6px 14px;
            background: #333;
            border: none;
            border-radius: 20px;
            color: #ccc;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: all 0.3s;
        }

        .cat-btn:hover, .cat-btn.active {
            background: #e50914;
            color: #fff;
        }

        .channel-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 10px 10px;
        }

        .channel-list::-webkit-scrollbar {
            width: 6px;
        }

        .channel-list::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .channel-list::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin-bottom: 5px;
            background: #222;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .channel-item:hover {
            background: #2a2a2a;
            transform: translateX(5px);
        }

        .channel-item.active {
            border-color: #e50914;
            background: #2a1a1a;
        }

        .channel-logo {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: contain;
            background: #fff;
            padding: 3px;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .channel-info {
            flex: 1;
            min-width: 0;
        }

        .channel-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-group {
            font-size: 11px;
            color: #888;
        }

        .play-icon {
            width: 35px;
            height: 35px;
            background: #e50914;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            flex-shrink: 0;
        }

        .channel-item:hover .play-icon,
        .channel-item.active .play-icon {
            opacity: 1;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #000;
            position: relative;
        }

        .video-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            height: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .video-placeholder {
            text-align: center;
            color: #666;
        }

        .video-placeholder i {
            font-size: 80px;
            margin-bottom: 20px;
            color: #333;
        }

        .video-placeholder h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .video-placeholder p {
            font-size: 14px;
        }

        /* Player Controls */
        .player-controls {
            background: #1a1a1a;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-top: 1px solid #333;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn:hover {
            background: #333;
            color: #e50914;
        }

        .ctrl-btn.play-btn {
            background: #e50914;
            font-size: 20px;
        }

        .ctrl-btn.play-btn:hover {
            background: #ff0a16;
        }

        .now-playing {
            flex: 1;
            margin-left: 15px;
        }

        .now-playing h3 {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .now-playing span {
            font-size: 12px;
            color: #888;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-control input[type="range"] {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: #444;
            border-radius: 2px;
            outline: none;
        }

        .volume-control input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #e50914;
            border-radius: 50%;
            cursor: pointer;
        }

        .fullscreen-btn {
            margin-left: auto;
        }

        /* Mobile Toggle */
        .menu-toggle {
            display: none;
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            border: none;
            color: #fff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }

        /* Loading Spinner */
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #333;
            border-top-color: #e50914;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                z-index: 99;
                height: 100%;
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .menu-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .main-content {
                width: 100%;
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #e50914;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

                </div>
            </div>
            
            <div class="category-filter" id="categoryFilter">

                <button class="cat-btn" data-cat="Haber">Haber</button>
                <button class="cat-btn" data-cat="Spor">Spor</button>

                <button class="cat-btn" data-cat="XXX">XXX</button>
            </div>

            <div class="channel-list" id="channelList">
                <!-- Kanallar JS ile yüklenecek -->
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <button class="menu-toggle" id="menuToggle">
                <i class="fas fa-bars"></i>
            </button>

            <div class="video-container">
                <div class="video-placeholder" id="placeholder">
                    <i class="fas fa-play-circle"></i>
                    <h2>IPTV Player</h2>
                    <p>Sol menüden bir kanal seçin</p>
                </div>
                <video id="videoPlayer" controls style="display: none;"></video>
                <div class="loading" id="loading">
                    <div class="spinner"></div>
                </div>
            </div>

            <div class="player-controls" id="controls" style="display: none;">
                <button class="ctrl-btn play-btn" id="playBtn">
                    <i class="fas fa-pause"></i>
                </button>
                <button class="ctrl-btn" id="prevBtn">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="ctrl-btn" id="nextBtn">
                    <i class="fas fa-step-forward"></i>
                </button>
                
                <div class="now-playing">
                    <h3 id="currentChannel">Kanal Seçilmedi</h3>
                    <span id="currentGroup">-</span>
                </div>

                <div class="volume-control">
                    <button class="ctrl-btn" id="muteBtn">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <input type="range" id="volumeSlider" min="0" max="100" value="50">
                </div>

                <button class="ctrl-btn fullscreen-btn" id="fullscreenBtn">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

        let currentChannelIndex = -1;
        let currentCategory = 'all';
        let filteredChannels = [...channels];

        const video = document.getElementById('videoPlayer');
        const placeholder = document.getElementById('placeholder');
        const controls = document.getElementById('controls');
        const loading = document.getElementById('loading');
        const channelList = document.getElementById('channelList');
        const currentChannelEl = document.getElementById('currentChannel');
        const currentGroupEl = document.getElementById('currentGroup');
        const playBtn = document.getElementById('playBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const muteBtn = document.getElementById('muteBtn');
        const searchInput = document.getElementById('searchInput');
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        const toast = document.getElementById('toast');

        // Kanal listesini oluştur
        function renderChannels(list) {
            channelList.innerHTML = '';
            list.forEach((channel, index) => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                item.dataset.index = channels.indexOf(channel);
                
                item.innerHTML = `
                    <img src="${channel.logo}" alt="${channel.name}" class="channel-logo" onerror="this.src='https://via.placeholder.com/50?text=TV'">
                    <div class="channel-info">
                        <div class="channel-name">${channel.name}</div>
                        <div class="channel-group">${channel.group}</div>
                    </div>
                    <div class="play-icon"><i class="fas fa-play"></i></div>
                `;
                
                item.addEventListener('click', () => playChannel(channels.indexOf(channel)));
                channelList.appendChild(item);
            });
        }

        // Kanal oynat
        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            currentChannelIndex = index;
            const channel = channels[index];
            
            // UI güncelle
            document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
            const activeItem = document.querySelector(`[data-index="${index}"]`);
            if (activeItem) activeItem.classList.add('active');
            
            currentChannelEl.textContent = channel.name;
            currentGroupEl.textContent = channel.group;
            
            // Video yükle
            placeholder.style.display = 'none';
            video.style.display = 'block';
            controls.style.display = 'flex';
            loading.classList.add('active');
            
            video.src = channel.url;
            video.load();
            
            video.play().then(() => {
                loading.classList.remove('active');
                showToast(`${channel.name} oynatılıyor...`);
                updatePlayButton(true);
            }).catch(err => {
                loading.classList.remove('active');
                showToast('Kanal yüklenemedi!', true);
                console.error('Oynatma hatası:', err);
            });
            
            // Mobilde sidebar kapat
            if (window.innerWidth <= 768) {
                sidebar.classList.remove('open');
            }
        }

        // Oynat/Duraklat
        function togglePlay() {
            if (video.paused) {
                video.play();
                updatePlayButton(true);
            } else {
                video.pause();
                updatePlayButton(false);
            }
        }

        function updatePlayButton(playing) {
            playBtn.innerHTML = playing ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
        }

        // Sonraki/Önceki kanal
        function nextChannel() {
            if (currentChannelIndex < channels.length - 1) {
                playChannel(currentChannelIndex + 1);
            }
        }

        function prevChannel() {
            if (currentChannelIndex > 0) {
                playChannel(currentChannelIndex - 1);
            }
        }

        // Ses kontrolü
        function toggleMute() {
            video.muted = !video.muted;
            muteBtn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        }

        // Tam ekran
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Toast bildirim
        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.style.background = isError ? '#e74c3c' : '#e50914';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Kategori filtreleme
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const cat = btn.dataset.cat;
                currentCategory = cat;
                filterChannels();
            });
        });

        // Arama
        searchInput.addEventListener('input', filterChannels);

        function filterChannels() {
            const search = searchInput.value.toLowerCase();
            
            filteredChannels = channels.filter(ch => {
                const matchCat = currentCategory === 'all' || ch.group.includes(currentCategory);
                const matchSearch = ch.name.toLowerCase().includes(search);
                return matchCat && matchSearch;
            });
            
            renderChannels(filteredChannels);
        }

        // Event listeners
        playBtn.addEventListener('click', togglePlay);
        document.getElementById('nextBtn').addEventListener('click', nextChannel);
        document.getElementById('prevBtn').addEventListener('click', prevChannel);
        muteBtn.addEventListener('click', toggleMute);
        document.getElementById('fullscreenBtn').addEventListener('click', toggleFullscreen);
        
        volumeSlider.addEventListener('input', (e) => {
            video.volume = e.target.value / 100;
        });

        menuToggle.addEventListener('click', () => {
            sidebar.classList.toggle('open');
        });

        video.addEventListener('ended', () => updatePlayButton(false));
        video.addEventListener('pause', () => updatePlayButton(false));
        video.addEventListener('play', () => updatePlayButton(true));

        // Klavye kısayolları
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && currentChannelIndex !== -1) {
                e.preventDefault();
                togglePlay();
            }
            if (e.code === 'ArrowRight') nextChannel();
            if (e.code === 'ArrowLeft') prevChannel();
            if (e.code === 'KeyF') toggleFullscreen();
        });

        // Başlat
        renderChannels(channels);
    </script>
